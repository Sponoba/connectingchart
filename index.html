<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SPONOBA Assessment</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SPONOBA">
<meta name="theme-color" content="#152C53">
<link rel="apple-touch-icon" href="icon-180.png">
<script>let _sb,_editId=null;const TPL_VER='2.0';</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#152C53;--orange:#E83E0B;--orange-light:#FFF3ED;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;--g400:#9CA3AF;--g500:#6B7280;--g700:#374151;--g800:#1F2937;--ok:#059669;--ok-bg:#ECFDF5;--warn:#D97706}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--g50);color:var(--g700);min-height:100vh;max-width:1200px;margin:0 auto;padding-bottom:80px}
.hd{background:var(--navy);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(21,44,83,.3)}
.hd-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo{font-family:'Oswald',sans-serif;font-weight:700;font-size:18px;letter-spacing:2px}
.logo-s{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.5px}
.li{width:32px;height:32px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:#fff}
.hd-r{margin-left:auto;display:flex;gap:6px}
.hb{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:500}
.tabs{display:flex;background:rgba(255,255,255,.08);border-radius:10px;padding:3px;overflow-x:auto;gap:2px;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 12px;border:none;border-radius:8px;background:transparent;color:rgba(255,255,255,.55);font-family:'Oswald',sans-serif;font-weight:600;font-size:12px;letter-spacing:.5px;cursor:pointer;transition:all .25s;white-space:nowrap}
.tb.on{background:var(--orange);color:#fff}
.pi{background:#fff;padding:14px 16px;border-bottom:1px solid var(--g200)}
.ir{display:grid;gap:8px;margin-bottom:8px}
.ir.c2{grid-template-columns:1fr 80px}
.ir.eq{grid-template-columns:1fr 1fr}
.ir.cr{grid-template-columns:80px 1fr;align-items:center;margin-bottom:0}
.fl{font-size:11px;color:var(--g500);font-weight:600;margin-bottom:2px;display:block}
.fi{width:100%;padding:8px 10px;border:1.5px solid var(--g300);border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .2s;background:#fff}
.fi:focus{border-color:var(--orange)}
/* Login */
.eb{display:none;background:#FEF3C7;border-bottom:2px solid var(--warn);padding:10px 16px;text-align:center;font-size:13px;font-weight:600;color:#92400E}
.eb.on{display:block}
.eb button{margin-left:12px;background:#92400E;color:#fff;border:none;border-radius:6px;padding:4px 14px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.main-layout{display:flex;gap:0;min-height:calc(100vh - 120px)}
.svg-panel{width:38%;min-width:300px;position:sticky;top:100px;height:calc(100vh - 120px);overflow-y:auto;background:#fff;border-right:2px solid var(--g200);padding:8px}
.svg-panel svg{width:100%;height:auto}
.input-panel{flex:1;min-width:0}
.bp-circle{cursor:pointer;transition:all .15s}
.bp-circle:hover{transform:scale(1.3);filter:brightness(1.2)}
.bp-num{font-family:'Oswald',sans-serif;font-weight:700;font-size:9px;fill:#fff;pointer-events:none;text-anchor:middle;dominant-baseline:central}
.bp-label{font-family:'Noto Sans JP',sans-serif;font-size:7px;fill:var(--g500);text-anchor:middle}
.svg-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:var(--navy);text-align:center;padding:6px 0 2px;letter-spacing:1px}
.svg-panel .num:hover{opacity:0.6;font-size:10px}
@media(max-width:768px){.main-layout{flex-direction:column}.svg-panel{width:100%;position:relative;top:0;height:auto;max-height:40vh;border-right:none;border-bottom:2px solid var(--g200)}}
.csv-btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:600;margin-top:8px;width:100%}
.det-edit{background:var(--orange);color:#fff;border:none;border-radius:10px;padding:10px;font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:700;width:100%;margin-top:12px}
.lb .fi{margin-bottom:12px}
.lbt{width:100%;padding:14px;background:var(--orange);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.lbt:disabled{opacity:.5}
.lerr{color:#B91C1C;font-size:13px;text-align:center;margin-top:8px;min-height:18px}
.llogo{font-family:'Oswald',sans-serif;font-size:32px;color:#fff;letter-spacing:3px;margin-bottom:24px}
/* Search */
.sp{display:none;background:#fff;border-bottom:2px solid var(--orange);padding:14px 16px}
.sp.open{display:block}
.srow{display:flex;gap:8px;margin-bottom:8px;align-items:end}
.srow .fi{flex:1}
.sbtn{padding:8px 18px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.scls{padding:8px 12px;background:var(--g200);color:var(--g700);border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.srl{margin-top:8px;max-height:320px;overflow-y:auto}
.sri{padding:10px 12px;border:1px solid var(--g200);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:background .15s}
.sri:hover,.sri:active{background:var(--g50)}
.sri b{color:var(--navy);font-size:14px}
.sri small{display:block;font-size:12px;color:var(--g500);margin-top:2px}
.sr0{color:var(--g400);font-size:13px;text-align:center;padding:16px}
/* Detail modal */
.dmo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.dmo.on{display:flex}
.dmd{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:20px}
.dmh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.dmt{font-family:'Oswald',sans-serif;font-size:18px;color:var(--navy)}
.dmx{background:var(--g200);border:none;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer}
.dtbl{width:100%;border-collapse:collapse;font-size:13px}
.dtbl th{background:var(--navy);color:#fff;padding:6px 10px;text-align:left;font-size:12px}
.dtbl td{padding:6px 10px;border-bottom:1px solid var(--g200)}
.dtbl tr:nth-child(even){background:var(--g50)}
/* PW change modal */
.pwmo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:none;align-items:center;justify-content:center;padding:24px}
.pwmo.on{display:flex}
.pwbox{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:360px}
.pwbox h3{font-family:'Oswald',sans-serif;color:var(--navy);font-size:20px;text-align:center;margin-bottom:16px}
.pwbox .fi{margin-bottom:12px}
.pwok{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.pwok:disabled{opacity:.5}
.pwmsg{font-size:13px;text-align:center;margin-top:8px;min-height:18px}
.ps{padding:10px 16px;background:#fff;border-bottom:1px solid var(--g200)}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.pl{font-size:12px;color:var(--g500);font-weight:600}
.pv{font-size:12px;font-weight:700}
.pb{height:6px;background:var(--g200);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .35s ease}
.ct{padding:14px 16px 8px}
.ctt{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--navy);letter-spacing:1px}
.cts{font-size:12px;color:var(--g500);margin-top:2px}
.ic{background:#fff}
.row{display:grid;grid-template-columns:38px 1fr;gap:8px;padding:11px 14px;border-bottom:1px solid var(--g100)}
.rn{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:var(--navy);text-align:center;padding-top:2px}
.rl{font-size:14px;font-weight:600;color:var(--g800);margin-bottom:6px}
.og{margin-bottom:5px;display:flex;align-items:flex-start;flex-wrap:wrap;gap:4px}
.gl{font-size:11px;color:var(--g500);font-weight:700;min-width:22px;padding-top:5px;flex-shrink:0}
.pls{display:flex;flex-wrap:wrap;gap:4px}
.p{padding:5px 12px;border-radius:18px;border:1.5px solid var(--g300);background:#fff;color:var(--g700);font-size:13px;font-weight:500;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;-webkit-user-select:none}
.p:hover{border-color:var(--orange)}
.p.on{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:700;box-shadow:0 2px 6px rgba(232,107,44,.3)}
.bb{position:fixed;bottom:0;left:0;right:0;max-width:1200px;margin:0 auto;background:#fff;border-top:1px solid var(--g200);padding:12px 16px;display:flex;gap:8px;z-index:200;box-shadow:0 -2px 10px rgba(0,0,0,.06)}
.ab{flex:1;padding:12px 0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s}
.bc{border:1.5px solid var(--g300);background:#fff;color:var(--g500)}
.be{border:1.5px solid var(--navy);background:#fff;color:var(--navy)}
.bs{flex:1.5;border:none;background:linear-gradient(135deg,var(--orange),#D97706);color:#fff;font-weight:700}
.bs.ok{background:var(--ok)}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--ok);color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 4px 16px rgba(5,150,105,.35);opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
.ft{padding:24px 16px;text-align:center;font-size:11px;color:var(--g400)}
.hp{display:none;background:#fff;padding:14px 16px;border-bottom:2px solid var(--orange)}
.hp.open{display:block}
.ht{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:8px}
.hi{padding:8px 0;border-bottom:1px solid var(--g200);font-size:13px}
.hn{font-weight:600}.hm{color:var(--g500);margin-left:8px}
.he{font-size:13px;color:var(--g400)}
/* Traits specific */
.sec-hd{padding:12px 16px;background:var(--navy);color:#fff;font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;letter-spacing:1px;margin-top:4px}
.traits-row{padding:12px 16px;border-bottom:1px solid var(--g100);background:#fff}
.tr-label{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:8px}
.tr-sub{font-size:12px;color:var(--g500);font-weight:600;margin-bottom:4px}
.tr-input{width:100%;padding:8px 10px;border:1.5px solid var(--g300);border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;background:#fff}
.tr-input:focus{border-color:var(--orange)}
.tr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.tr-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.rating-group{display:flex;gap:4px;margin-top:4px}
.rating-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--g300);background:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--g700)}
.rating-btn.on{background:var(--orange);color:#fff;border-color:var(--orange)}
@media(max-width:400px){.p{padding:4px 9px;font-size:12px}.rl{font-size:13px}.tb{font-size:11px;padding:7px 10px}}
</style>
</head>
<body>

    <button class="tb on" data-tab="connect" onclick="sw('connect')">CONNECT</button>

    <button class="tb" data-tab="operation" onclick="sw('operation')">OPERATION</button>

    <button class="tb" data-tab="traits" onclick="sw('traits')">TRAITS</button>

</div>

<!-- EDIT BANNER -->
<div class="eb" id="editBanner">
  ✏️ 編集モード：保存すると上書きされます
  <button onclick="clearEditMode()">キャンセル</button>
</div>

<div class="hp" id="hp">
  <div class="ht">保存履歴</div>
  <div id="hl"><div class="he">まだ保存データはありません</div></div>
</div>

<!-- SEARCH -->
<div class="sp" id="searchP">
  <div class="srow">
    <input class="fi" id="sQ" placeholder="選手名で検索">
    <button class="sbtn" onclick="doSearch()">検索</button>
    <button class="scls" onclick="toggleSearch()">閉じる</button>
  </div>
  <div class="srow">
    <div style="flex:1"><label class="fl">開始日</label><input class="fi" id="sFrom" type="date"></div>
    <div style="flex:1"><label class="fl">終了日</label><input class="fi" id="sTo" type="date"></div>
    <div><label class="fl">タブ</label>
      <select class="fi" id="sTab" style="padding:7px 8px">
        <option value="">すべて</option>
        <option value="connect">CONNECT</option>
        <option value="kinnetic">KINNETIC</option>
        <option value="operation">OPERATION</option>
        <option value="signal">SIGNAL</option>
        <option value="traits">TRAITS</option>
      </select>
    </div>
  </div>
  <div class="srl" id="sRes"><div class="sr0">検索条件を入力して「検索」を押してください</div></div>
  <button class="csv-btn" onclick="exportCSV()">📥 検索結果をCSVダウンロード</button>
</div>

<!-- Player Info -->
<div class="main-layout">
<!-- SVG DIAGRAM -->
<div class="svg-panel">
<div class="svg-title" id="svgTitle">POWER CONNECT CHARTS</div>
<div id="svgBody"></div>
</div>
<!-- INPUT PANEL -->
<div class="input-panel">
<div class="pi">
  <!-- 行1: 姓・名・性別・担当者 -->
  <div class="ir" style="grid-template-columns:1fr 1fr 72px 1fr">
    <div><label class="fl">姓</label><input class="fi" id="pLN" placeholder="山田"></div>
    <div><label class="fl">名</label><input class="fi" id="pFN" placeholder="太郎"></div>
    <div><label class="fl">性別</label>
      <select class="fi" id="pGender">
        <option value="">—</option>
        <option value="男">男</option>
        <option value="女">女</option>
      </select>
    </div>
    <div><label class="fl">担当者</label>
      <select class="fi" id="pTrainer">
        <option value="">—</option>
        <option value="木村">木村</option>
        <option value="田丸">田丸</option>
        <option value="万城目">万城目</option>
        <option value="中川">中川</option>
        <option value="佐藤">佐藤</option>
        <option value="柿崎">柿崎</option>
        <option value="真砂">真砂</option>
        <option value="田中">田中</option>
      </select>
    </div>

function scrollToItem(id){
  // Find the row with this item number and scroll to it
  const rows = document.querySelectorAll('.row');
  for(const row of rows){
    const numEl = row.querySelector('.rn');
    if(numEl && parseInt(numEl.textContent) === id){
      row.scrollIntoView({behavior:'smooth',block:'center'});
      row.style.background='var(--orange-light)';
      setTimeout(()=>{row.style.background='';},1500);
      break;
    }
  }
}

// ═══ RENDER ═══
function render(){
  const mc=document.getElementById('mainContent');
  if(TABS[cur].type==='traits'){
    mc.innerHTML=renderTraits();
  } else {
    mc.innerHTML='<div class="ic">'+TABS[cur].data.map(item=>renderRow(item)).join('')+'</div>';
  }
  updateProgress();
}

function renderRow(item){
  let h=`<div class="row"><div class="rn">${item.id}</div><div><div class="rl">${item.l}</div>`;
  item.g.forEach((gr,gi)=>{
    const key=`${item.id}_${gi}`;
    const mx=gr.m||1;
    h+=`<div class="og">`;
    if(gr.g) h+=`<span class="gl">${gr.g}</span>`;
    h+=`<div class="pls">`;
    gr.o.forEach(opt=>{
      if(opt==='※自由記述'){
        h+=`<input class="fi" style="width:160px;padding:5px 8px;font-size:13px" placeholder="自由記述" value="${vals[cur][key]||''}" oninput="setFree('${key}',this.value)">`;
      } else {
        const v=vals[cur][key]||'';
        const isOn= mx>1 ? v.split(',').includes(opt) : v===opt;
        h+=`<button class="p ${isOn?'on':''}" onclick="sel('${key}','${opt.replace(/'/g,"\\'")}',this,${mx})">${opt}</button>`;
      }
    });
    h+=`</div></div>`;
  });
  h+=`</div></div>`;
  return h;
}

          </select></div>
        <div><span class="tr-sub">主観 (1-5)</span>
          <div class="rating-group">${[1,2,3,4,5].map(n=>`<button class="rating-btn ${v[ks]==n?'on':''}" onclick="setT('${ks}',${n});render()">${n}</button>`).join('')}</div>

        const sel=vals.traits[key]===opt?'on':'';

      });
      h+=`</div></div>`;

// ═══ INTERACTIONS ═══
function sel(key,opt,el,mx){
  mx=mx||1;
  const v=vals[cur];
  if(mx===1){
    if(v[key]===opt){delete v[key];el.classList.remove('on');}
    else{v[key]=opt;el.parentElement.querySelectorAll('.p').forEach(p=>p.classList.remove('on'));el.classList.add('on');}
  } else {
    let arr=(v[key]||'').split(',').filter(x=>x);
    const idx=arr.indexOf(opt);
    if(idx>=0){arr.splice(idx,1);el.classList.remove('on');}
    else if(arr.length<mx){arr.push(opt);el.classList.add('on');}
    v[key]=arr.join(',');
    if(!v[key]) delete v[key];
  }
  updateProgress();
}
function selT(key,opt,el){
  if(vals.traits[key]===opt) delete vals.traits[key];
  else vals.traits[key]=opt;
  render();
}
function setT(key,val){vals.traits[key]=val;}
function setFree(key,val){vals[cur][key]=val;}

// ═══ PROGRESS ═══
function updateProgress(){
  if(TABS[cur].type==='traits'){
    const v=vals.traits;
    const filled=Object.values(v).filter(x=>x!==null&&x!==undefined&&x!=='').length;
    const total=5*3+7*3; // rough estimate
    const pct=Math.min(100,Math.round((filled/total)*100));
    document.getElementById('pvt').textContent=`${filled}項目入力済`;
    document.getElementById('pvt').style.color=pct>=80?'var(--ok)':'var(--orange)';
    document.getElementById('pfl').style.width=pct+'%';
    return;
  }
  const items=TABS[cur].data;
  let total=0;items.forEach(i=>{total+=i.g.length;});
  const filled=Object.keys(vals[cur]).filter(k=>vals[cur][k]!==null&&vals[cur][k]!==undefined&&vals[cur][k]!=='').length;
  const pct=Math.round((filled/total)*100);
  const done=pct===100;
  document.getElementById('pvt').textContent=`${filled}/${total} (${pct}%)`;
  document.getElementById('pvt').style.color=done?'var(--ok)':'var(--orange)';
  document.getElementById('pfl').style.width=pct+'%';
  document.getElementById('pfl').style.background=done?'linear-gradient(90deg,#059669,#10B981)':'linear-gradient(90deg,var(--orange),#F59E0B)';
}

async function saveData(){
  const lastName=document.getElementById('pLN').value.trim();
  const firstName=document.getElementById('pFN').value.trim();
  const name=(lastName+' '+firstName).trim();
  const dob=document.getElementById('pDOB').value;
  const team=document.getElementById('pT').value.trim();
  const date=document.getElementById('pD').value;
  if(!lastName){alert('姓を入力してください');return;}
  if(!firstName){alert('名を入力してください');return;}
  if(!dob){alert('生年月日を入力してください');return;}
  if(!team){alert('チーム名を入力してください');return;}
  if(!date){alert('測定日を入力してください');return;}

  const b=document.getElementById('svb');
  b.textContent='保存中...';b.disabled=true;

  const row={
    player_name:name,
    player_last_name:lastName,
    player_first_name:firstName,
    player_dob:dob||null,
    player_gender:document.getElementById('pGender').value||null,
    player_team:document.getElementById('pT').value||null,
    player_level:document.getElementById('pLevel').value||null,
    trainer_name:document.getElementById('pTrainer').value||null,
    player_position:document.getElementById('pPos').value||null,
    height_cm:parseFloat(document.getElementById('pH').value)||null,
    weight_kg:parseFloat(document.getElementById('pW').value)||null,
    assessment_date:date,
    c_degree:document.getElementById('pC').value||null,
    video_url:document.getElementById('pV').value.trim()||null,
    chart_type:cur,
    template_version:TPL_VER,
    values:vals[cur],
  };

  let error;
  if(_editId){
    // 上書き更新
    ({error}=await _sb.from('assessments').update(row).eq('id',_editId));
  } else {
    // 新規追加
    ({error}=await _sb.from('assessments').insert(row));
  }

  if(error){
    alert('保存エラー: '+error.message);
    b.textContent='保存する';b.disabled=false;
    return;
  }

  // ローカル履歴にも追加
  const rec={date,name,chart:cur.toUpperCase(),time:new Date().toLocaleString('ja-JP'),values:{...vals[cur]}};
  hist.unshift(rec);
  document.getElementById('hc').textContent=hist.length;
  renderHist();

  const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
  const msg=_editId?'✓ 更新済み':'✓ 保存済み';
  b.textContent=msg;b.classList.add('ok');b.disabled=false;
  clearEditMode();
  setTimeout(()=>{b.textContent='保存する';b.classList.remove('ok');},2500);
}

// ═══ CSV EXPORT ═══
async function exportCSV(){
  // Use same search filters
  let q=_sb.from('assessments').select('*').order('assessment_date',{ascending:false}).limit(1000);
  const name=document.getElementById('sQ').value.trim();
  if(name) q=q.ilike('player_name','%'+name+'%');
  const from=document.getElementById('sFrom').value;
  const to=document.getElementById('sTo').value;
  if(from) q=q.gte('assessment_date',from);
  if(to) q=q.lte('assessment_date',to);
  const tab=document.getElementById('sTab').value;
  if(tab) q=q.eq('chart_type',tab);

  const{data,error}=await q;
  if(error){alert('エラー: '+error.message);return;}
  if(!data||!data.length){alert('ダウンロードするデータがありません');return;}

  // Collect all value keys across all records
  const allKeys=new Set();
  data.forEach(r=>{if(r.values)Object.keys(r.values).forEach(k=>allKeys.add(k));});
  const vKeys=[...allKeys].sort();

  // Build CSV header
  const headers=['選手名','年齢','チーム','所属','ポジション','担当者','身長cm','体重kg','測定日','C度','チャート',...vKeys];
  const rows=[headers.join(',')];

  data.forEach(r=>{
    const base=[
      '"'+(r.player_name||'').replace(/"/g,'""')+'"',
      r.player_age||'',
      '"'+(r.player_team||'').replace(/"/g,'""')+'"',
      '"'+(r.player_level||'').replace(/"/g,'""')+'"',
      '"'+(r.player_position||'').replace(/"/g,'""')+'"',
      '"'+(r.trainer_name||'').replace(/"/g,'""')+'"',
      r.height_cm||'',
      r.weight_kg||'',
      r.assessment_date||'',
      '"'+(r.c_degree||'')+'"',
      (r.chart_type||'').toUpperCase()
    ];
    const vCols=vKeys.map(k=>{
      const v=(r.values||{})[k];
      return v!==undefined?'"'+String(v).replace(/"/g,'""')+'"':'';
    });
    rows.push([...base,...vCols].join(','));
  });

  const bom='\uFEFF';
  const blob=new Blob([bom+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  const d=new Date().toISOString().slice(0,10);
  a.download='SPONOBA_assessment_'+d+'.csv';
  a.click();URL.revokeObjectURL(url);
}

// ═══ EXPORT ALL MEMBERS ═══
async function exportAll(){
  if(!confirm('全会員の全データをCSV出力します。よろしいですか？'))return;

  // Fetch all records
  const{data,error}=await _sb.from('assessments').select('*').order('player_name').order('assessment_date',{ascending:false}).limit(5000);
  if(error){alert('エラー: '+error.message);return;}
  if(!data||!data.length){alert('データがありません');return;}

  // Build column definitions (same as single export)
  const allCols=[];
  const chartDefs=[
    {name:'CONNECT',data:D_CON},
    {name:'KINNETIC',data:D_KIN},
    {name:'OPERATION',data:D_OPE},
    {name:'SIGNAL',data:D_SIG}
  ];
  chartDefs.forEach(cd=>{
    cd.data.forEach(item=>{
      item.g.forEach((gr,gi)=>{
        const key=`${item.id}_${gi}`;
        const grLabel=gr.g?` ${gr.g}`:'';
        const header=`${cd.name}: ${item.id}.${item.l}${grLabel}`;
        allCols.push({key,header,getVal:r=>{
          if((r.chart_type||'')!==cd.name.toLowerCase()) return '';
          const v=(r.values||{})[key];
          return v!==undefined&&v!==null&&v!==''?String(v):'';
        }});
      });
    });
  });

  const fpTests=['Countermovement Jump','Squat Jump','10 Hop Test','Plyometric PushUp','Isometric Test'];
  fpTests.forEach((test,i)=>{
    [{k:`fp_val_${i}`,s:'数値'},{k:`fp_react_${i}`,s:'Reaction'},{k:`fp_subj_${i}`,s:'主観'}].forEach(f=>{
      allCols.push({key:f.k,header:`TRAITS: ${test} ${f.s}`,getVal:r=>{
        if((r.chart_type||'')!=='traits') return '';
        const v=(r.values||{})[f.k];
        return v!==undefined&&v!==null&&v!==''?String(v):'';
      }});
    });
  });

  const senDef=[
    {id:1,l:'バランス',g:['型','体幹','前腕']},
    {id:2,l:'リズム',g:['指先系','部位','上下']},
    {id:3,l:'姿勢',g:['脊柱','字型','頭部']},
    {id:4,l:'体勢',g:['骨盤','大腿骨','屈伸','部位']},
    {id:5,l:'連動',g:['肩甲骨','連動型','主体','キネ']},
    {id:6,l:'出力づくり',g:['強度','部位']},
    {id:7,l:'呼吸',g:['配分','部位','方向']}
  ];
  senDef.forEach(item=>{
    item.g.forEach((gn,gi)=>{
      const key=`sen_${item.id}_${gi}`;
      allCols.push({key,header:`TRAITS: ${item.id}.${item.l} ${gn}`,getVal:r=>{
        if((r.chart_type||'')!=='traits') return '';
        const v=(r.values||{})[key];
        return v!==undefined&&v!==null&&v!==''?String(v):'';
      }});
    });
  });

  // Build CSV
  const headers=['姓','名','生年月日','性別','チーム','所属','ポジション','担当者','身長cm','体重kg','測定日','C度','チャート',...allCols.map(c=>c.header)];
  const esc=s=>'"'+(s||'').toString().replace(/"/g,'""')+'"';
  const rows=[headers.map(h=>esc(h)).join(',')];

  data.forEach(r=>{
    const base=[
      esc(r.player_last_name||r.player_name),
      esc(r.player_first_name||''),
      r.player_dob||'',
      esc(r.player_gender||''),
      esc(r.player_team),
      esc(r.player_level||''),
      esc(r.player_position),
      esc(r.trainer_name||''),
      r.height_cm||'',
      r.weight_kg||'',
      r.assessment_date||'',
      esc(r.c_degree),
      (r.chart_type||'').toUpperCase()
    ];
    const valCols=allCols.map(c=>esc(c.getVal(r)));
    rows.push([...base,...valCols].join(','));
  });

  const bom='\uFEFF';
  const blob=new Blob([bom+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  const d=new Date().toISOString().slice(0,10);
  a.download='SPONOBA_全会員_'+d+'.csv';
  a.click();URL.revokeObjectURL(url);
  alert('✓ '+data.length+'件のデータを出力しました');
}
